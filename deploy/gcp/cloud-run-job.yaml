apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: yawl-claude-code
  labels:
    app: yawl-claude-code
    managed-by: gcloud
spec:
  template:
    spec:
      template:
        spec:
          serviceAccountName: yawl-claude-runner@PROJECT_ID.iam.gserviceaccount.com
          # Run once to completion; allow 1 retry on transient failure
          maxRetries: 1
          timeoutSeconds: 3600
          containers:
            - name: claude-code
              image: REGION-docker.pkg.dev/PROJECT_ID/yawl/claude-code:latest
              resources:
                limits:
                  cpu: "4"
                  memory: 8Gi
              env:
                - name: GIT_REPO_URL
                  value: "https://source.developers.google.com/p/PROJECT_ID/r/yawl"
                - name: GIT_BRANCH
                  value: "master"
                - name: GIT_USER_NAME
                  value: "Claude Code GCP Bot"
                - name: GIT_USER_EMAIL
                  value: "claude-code@gcp.run"
                - name: ANTHROPIC_MODEL
                  value: "claude-sonnet-4-6"
                - name: USE_WORKLOAD_IDENTITY
                  value: "true"
                - name: CLAUDE_CODE_REMOTE
                  value: "true"
                # CLAUDE_TASK is passed at execution time via --update-env-vars
                # ANTHROPIC_API_KEY is injected from Secret Manager
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: anthropic-api-key
                      key: latest
