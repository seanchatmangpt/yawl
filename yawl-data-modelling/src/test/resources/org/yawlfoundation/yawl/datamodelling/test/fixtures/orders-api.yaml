openapi: "3.0.0"
info:
  title: Orders API
  version: "1.0.0"
paths:
  /orders:
    get:
      summary: List orders
      responses:
        "200":
          description: Order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
components:
  schemas:
    Order:
      type: object
      properties:
        order_id:
          type: integer
        customer_id:
          type: integer
        total_amount:
          type: number
        status:
          type: string
        created_at:
          type: string
          format: date-time
      required: [order_id, customer_id, total_amount, status]
