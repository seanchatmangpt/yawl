# QLever FFI Configuration Properties
# These properties are used by the Java build system to locate the native library

# Library name for dynamic loading
qlever.ffi.library.name=qlever_ffi

# Supported platforms
qlever.ffi.platforms.macos=x86_64,aarch64
qlever.ffi.platforms.linux=x86_64,aarch64,x86
qlever.ffi.platforms.windows=x86_64,x86

# Library version
qlever.ffi.version=${project.version}

# Include directories for FFI headers
qlever.ffi.includes=${MAVEN_NATIVE_DIR}/include

# Dependencies
qlever.ffi.dependencies=
qlever.ffi.runtime.dependencies=

# Link flags
qlever.ffi.link.flags=

# Compiler flags
qlever.ffi.compiler.flags=

# Enabled features
qlever.ffi.features=
qlever.ffi.features.native-benchmarks=${BUILD_BENCHMARKS}
qlever.ffi.features.native-tests=${BUILD_TESTS}
qlever.ffi.features.qlever-integration=${QLever_FOUND}