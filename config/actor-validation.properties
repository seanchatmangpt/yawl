# Actor Validation Configuration
# This file contains configuration properties for the Actor Validation System

# Validation Settings
actor.validation.enabled=true
actor.validation.interval.seconds=30
actor.validation.parallel.threads=512

# Memory Leak Detection
actor.validation.memory.threshold.mb=100
actor.validation.memory.check.interval.seconds=60
actor.validation.memory.alert.threshold.percent=80

# Deadlock Detection
actor.validation.deadlock.enabled=true
actor.validation.deadlock.timeout.seconds=30
actor.validation.deadlock.thread.count.threshold=5

# Performance Monitoring
actor.validation.performance.slow.threshold.ms=5000
actor.validation.performance.alert.threshold.percent=90
actor.validation.performance.history.size=1000

# MCP Server Configuration
actor.validation.mcp.enabled=true
actor.validation.mcp.port=8080
actor.validation.mcp.host=localhost
actor.validation.mcp.ssl.enabled=false
actor.validation.mcp.ssl.keystore.path=
actor.validation.mcp.ssl.keystore.password=

# Observability Configuration
actor.validation.observability.enabled=true
actor.validation.observability.metrics.port=9090
actor.validation.observability.tracing.enabled=true
actor.validation.observability.jaeger.endpoint=http://localhost:14268/api/traces
actor.validation.observability.prometheus.enabled=true

# Logging Configuration
actor.validation.log.level=INFO
actor.validation.log.file=logs/actor-validation.log
actor.validation.log.max.size.mb=100
actor.validation.log.max.backup.files=5

# CI/CD Integration
actor.validation.ci.enabled=true
actor.validation.ci.artifacts.retention.days=30
actor.validation.ci.pr.comments.enabled=true

# Reporting
actor.validation.reports.enabled=true
actor.validation.reports.directory=target/validation-reports
actor.validation.reports.format=html,json
actor.validation.reports.include.metrics=true

# Health Check
actor.validation.health.enabled=true
actor.validation.health.check.interval.seconds=30
actor.validation.health.timeout.seconds=10

# Security
actor.validation.security.enabled=true
actor.validation.security.jwt.secret=
actor.validation.security.jwt.expiration.minutes=60

# Performance Tuning
actor.validation.performance.cache.enabled=true
actor.validation.performance.cache.size.mb=100
actor.validation.performance.cache.expiration.minutes=60

# Integration Settings
actor.validation.integration.ggen.enabled=true
actor.validation.integration.mcp.enabled=true
actor.validation.integration.a2a.enabled=true
actor.validation.integration.observability.enabled=true

# Development Settings
actor.validation.dev.mode=false
actor.validation.dev.verbose=false
actor.validation.dev.mock.data.enabled=false