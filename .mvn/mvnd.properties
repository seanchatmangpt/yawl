# Maven Daemon (mvnd) Configuration - YAWL v6.0.0-GA
# See: https://github.com/apache/maven-mvnd
#
# mvnd significantly speeds up builds through daemon reuse and caching.
# To install mvnd, visit: https://maven.apache.org/mvnd/download.html
# Or use: sdkman install maven-mvnd

# Idle timeout - keep daemon alive for 30 minutes of inactivity
idleTimeout=PT30M

# Thread count for parallel module building (2 per CPU core by default)
threads=

# Minimum heap size for daemon JVM
minHeapSize=2g

# Maximum heap size for daemon JVM (same as pom.xml Xmx setting)
maxHeapSize=8g

# Keep alive interval for remote connections
keepAlive=PT5M

# Number of worker threads for artifact resolution (8 threads for parallel downloads)
artifactResolverThreads=8

# Enable parallel artifact downloads
parallelArtifactResolution=true

# Enable parallel compilation across modules
parallelCompilation=true

# Directory for daemon metadata and logs
# ~/.mvnd by default
# storageDir=/path/to/storage

# Java system properties to pass to all daemon builds
# Note: These supplement .mvn/jvm.config (which is read by Maven wrapper)
jvmArgs=-Dfile.encoding=UTF-8 \
  -Djava.util.concurrent.ForkJoinPool.common.parallelism=15 \
  -Djdk.virtualThreadScheduler.parallelism=16 \
  -Djdk.tracePinnedThreads=short

# Priority for background builds (relative nice level)
nice=10

# Enable build cache for incremental builds
buildCacheEnabled=true
