name: Actor Validation

on:
  push:
    branches: [master, main, validating-actor-model]
    paths:
      - 'src/org/yawlfoundation/yawl/integration/actor/**'
      - 'src/org/yawlfoundation/yawl/integration/mcp/**'
      - 'yawl-ggen/**'
      - 'scripts/actor-validation.sh'
  pull_request:
    branches: [master, main]
    paths:
      - 'src/org/yawlfoundation/yawl/integration/actor/**'
      - 'src/org/yawlfoundation/yawl/integration/mcp/**'
      - 'yawl-ggen/**'
      - 'scripts/actor-validation.sh'
  workflow_dispatch:
    inputs:
      run_validation:
        description: 'Run actor validation'
        required: false
        default: 'true'
        type: boolean
      generate_report:
        description: 'Generate validation report'
        required: false
        default: 'true'
        type: boolean

env:
  MAVEN_OPTS: -XX:+UseCompactObjectHeaders -XX:MaxRAMPercentage=50.0 -Xmx4g
  ACTOR_VALIDATION_ENABLED: true
  VALIDATION_REPORTS: target/validation-reports

jobs:
  actor-validation:
    name: Actor Validation
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Cache Maven dependencies
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Configure Maven for actor validation
      run: |
        cat >> $GITHUB_STEP_SUMMARY << 'EOF'
        ## Actor Configuration
        - JDK 25 with Leyden AOT enabled
        - Maven 4 with concurrent builder
        - Virtual thread optimization (512 max pool)
        - Actor validation enabled
        - Actor validation plugins configured
        EOF

    - name: Build with Actor Validation
      run: |
        chmod +x scripts/build-with-actor-validation.sh
        ./scripts/build-with-actor-validation.sh \
          --batch-mode \
          --quiet \
          -DskipTests=false
      continue-on-error: true

    - name: Upload Validation Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: actor-validation-reports
        path: |
          target/validation-reports/
        retention-days: 30

    - name: Generate Validation Summary
      if: always()
      run: |
        # Generate summary markdown
        cat > validation-summary.md << 'EOF'
        # Actor Validation Summary

        ## Build Information
        - **Timestamp**: $(date -u)
        - **Commit**: ${{ github.sha }}
        - **Branch**: ${{ github.ref }}
        - **Actor Validation**: Enabled

        ## Validation Results
        EOF

        # Add violation counts
        if [ -f target/validation-reports/actor-validation/summary.txt ]; then
            echo "```" >> validation-summary.md
            cat target/validation-reports/actor-validation/summary.txt >> validation-summary.md
            echo "```" >> validation-summary.md
        fi

        echo "" >> validation-summary.md
        echo "## Validation Reports" >> validation-summary.md
        echo "- [JSON Report](target/validation-reports/actor-validation/actor-validation-report.json)" >> validation-summary.md
        echo "- [HTML Report](target/validation-reports/actor-validation/actor-validation-report.html)" >> validation-summary.md
        echo "- [Final Report](target/validation-reports/final-report.html)" >> validation-summary.md

        # Create GIST with validation results
        gist_url=$(gh gist create validation-summary.md --public --filename "actor-validation-$(date +%Y%m%d-%H%M%S).md" --desc "Actor validation results for ${{ github.sha }}")
        echo "Validation summary uploaded to: $gist_url"

        # Update PR comment if available
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          gh pr comment ${{ github.event.number }} --body "🔍 **Actor Validation Results**

          Build: ${{ github.workflow }} (#${{ github.run_number }})
          Commit: ${{ github.sha }}

          Summary: $gist_url

          [View full validation reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        fi

    - name: Publish Validation Results
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          // Create check result
          github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'Actor Validation',
            head_sha: context.sha,
            status: 'completed',
            conclusion: 'success',
            output: {
              title: 'Actor Validation Passed',
              summary: 'All actor validation checks passed successfully'
            }
          });

    - name: Publish Failure Results
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          // Create check result
          github.rest.checks.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'Actor Validation',
            head_sha: context.sha,
            status: 'completed',
            conclusion: 'failure',
            output: {
              title: 'Actor Validation Failed',
              summary: 'Actor validation failed. See reports for details.'
            }
          });

  validate-production-readiness:
    name: Production Readiness Check
    needs: actor-validation
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 15

    steps:
    - name: Download validation reports
      uses: actions/download-artifact@v4
      with:
        name: actor-validation-reports
        path: validation-reports/

    - name: Check validation results
      id: check-results
      run: |
        # Parse validation report
        violation_count=$(jq '.summary.total_violations // 0' validation-reports/actor-validation/actor-validation-report.json 2>/dev/null || echo "0")

        if [[ $violation_count -gt 0 ]]; then
          echo "validation_failed=true" >> $GITHUB_OUTPUT
          echo "violation_count=$violation_count" >> $GITHUB_OUTPUT
        else
          echo "validation_passed=true" >> $GITHUB_OUTPUT
        fi

    - name: Report validation status
      if: steps.check-results.outputs.validation_failed == 'true'
      run: |
        echo "🚨 Actor validation failed with ${{ steps.check-results.outputs.violation_count }} violations!"
        echo "Please fix the violations before proceeding to production."
        exit 1

    - name: Mark production readiness
      if: steps.check-results.outputs.validation_passed == 'true'
      run: |
        echo "✅ Actor validation passed - production ready!"