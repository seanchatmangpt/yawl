# Integration Test Configuration
#
# These properties control the behavior of integration tests
# and can be overridden via environment variables or system properties
#
# IMPORTANT: QLever is an embedded Java/C++ FFI bridge (NOT Docker, NOT HTTP)
# All QLever tests use QLeverEmbeddedSparqlEngine directly (in-process)

# QLever Configuration (EMBEDDED - no HTTP URL)
# QLever runs in-process via FFI bindings
qlever.embedded=true
qlever.timeout=5000
qlever.maxRetries=3
qlever.retryDelayMs=1000

# Oxigraph Configuration (HTTP service)
oxigraph.url=http://localhost:19877
oxigraph.timeout=10000

# YAWL Native Configuration (HTTP service)
yawl.native.url=http://localhost:8083
yawl.native.timeout=3000

# Performance Thresholds (milliseconds)
performance.simpleQueryThreshold=2000
performance.complexQueryThreshold=5000
performance.largeDatasetThreshold=15000
performance.concurrentQueryThreshold=10000

# Test Data Configuration
test.vendor.count=3
test.order.count=5
test.case.count=100
test.largeDataset.size=1000

# Concurrency Configuration
concurrent.requests=10
concurrent.threads=5
concurrent.timeout.seconds=30

# Error Recovery Configuration
retry.maxAttempts=3
retry.initialDelayMs=1000
retry.backoffMultiplier=2
retry.jitterMs=200

# Fallback Configuration
fallback.enabled=true
fallback.staticTools=true
fallback.queryTimeout=1000

# Logging Configuration
logging.level=INFO
logging.queries=true
logging.performance=true
logging.recovery=true

# CI/CD Configuration
ci.skipIfUnavailable=true
ci.parallelExecution=true
ci.timeoutMultiplier=1.5

# Test Categories
test.categories=integration,marketplace,analytics,qlever
test.tags=@integration

# Skip Configuration
skip.tests.qlever=false
skip.tests.analytics=false
skip.tests.marketplace=false
skip.tests.fallback=false

# Cleanup Configuration
cleanup.enabled=true
cleanup.timeoutMs=5000

# Test Data Paths
test.data.directory=src/test/resources/data/
test.export.directory=target/test-exports/

# Report Configuration
reports.enabled=true
reports.format=html
reports.directory=target/test-reports/
reports.includePerformance=true
reports.includeCoverage=true
