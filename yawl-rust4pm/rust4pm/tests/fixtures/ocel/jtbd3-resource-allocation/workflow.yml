---
# YAWL Workflow for Resource Allocation
# Complex resource allocation with conflict resolution and priority scheduling

id: "resource-allocation-jtbd3"
name: "Resource Allocation Workflow"
version: "1.0"
namespace: "yawl.tests.fixtures"

startTasks:
  - "register_patient"

tasks:
  "register_patient":
    name: "Register Patient"
    input: |
      {
        "patient_id": "@patient.id",
        "condition": "@patient.condition",
        "priority_level": "@calculate_priority(@patient)",
        "requested_services": "@patient.services",
        "time_constraints": "@patient.availability"
      }
    output: |
      {
        "case_id": "@generated.uuid",
        "registered_at": "@timestamp",
        "priority": "@patient.priority",
        "resource_needs": "@identify_resources(@patient.services)"
      }
    next: "resource_request"

  "resource_request":
    name: "Resource Request"
    input: |
      {
        "case_id": "@case.id",
        "priority": "@case.priority",
        "resource_needs": "@case.resource_needs",
        "constraints": "@patient.constraints"
      }
    output: |
      {
        "request_id": "@generated.uuid",
        "requested_resources": "@generate_resource_requests()",
        "flexibility_score": "@calculate_flexibility()",
        "deadline": "@calculate_deadline()"
      }
    next: "allocate_resources"

  "allocate_resources":
    name: "Resource Allocation"
    input: |
      {
        "request_id": "@request.id",
        "requested_resources": "@request.resources",
        "priority": "@case.priority"
      }
    output: |
      {
        "allocation_result": "@perform_allocation()",
        "conflicts": "@detect_conflicts()",
        "available_slots": "@find_available_slots()"
      }
    next: "conflict_resolution"
    exception:
      condition: "resource_conflict",
      handler: "conflict_handler"

  "conflict_resolution":
    name: "Conflict Resolution"
    options: [
      {
        "condition": "@conflicts.isEmpty()",
        "next": "treatment_scheduling"
      },
      {
        "condition": "@conflicts.can_be_resolved_with_prioritization()",
        "next": "resolve_with_priority"
      },
      {
        "condition": "@conflicts.require_substitution()",
        "next": "resource_substitution"
      },
      {
        "condition": "@conflicts.need_escalation()",
        "next": "escalate_conflict"
      }
    ]

  "resolve_with_priority":
    name: "Resolve with Priority Override"
    input: |
      {
        "conflicts": "@conflicts",
        "priority": "@case.priority",
        "resource_availability": "@resource_availability"
      }
    output: |
      {
        "resolution_type": "priority_override",
        "overridden_requests": [],
        "allocated_resources": "@prioritized_allocation()"
      }
    next: "treatment_scheduling"

  "resource_substitution":
    name: "Resource Substitution"
    input: |
      {
        "original_requests": "@conflicts.requests",
        "substitution_options": "@find_alternative_resources()",
        "skill_requirements": "@patient.skill_needs"
      }
    output: |
      {
        "substitution_plan": "@create_substitution_plan()",
        "quality_impact": "minimal",
        "substituted_resources": @substitution_map
      }
    next: "treatment_scheduling"

  "escalate_conflict":
    name: "Escalate Resource Conflict"
    input: |
      {
        "conflicts": "@conflicts",
        "priority": "@case.priority",
        "escalation_level": "@determine_escalation_level()"
      }
    output: |
      {
        "escalation_id": "@generated.uuid",
        "escalated_to": "@escalation.target",
        "resolution_authority": "@escalation.authority"
      }
    next: "await_escalation_resolution"

  "await_escalation_resolution":
    name: "Wait for Escalation Resolution"
    output: |
      {
        "awaiting_response": true,
        "escalation_timeout": "@timestamp.plusHours(24)"
      }
    next: "check_escalation_response"
    timeout: "24 hours"
    exception:
      condition: "escalation_timeout",
      handler: "timeout_handler"

  "check_escalation_response":
    name: "Check Escalation Response"
    input: |
      {
        "escalation_id": "@escalation.id",
        "pending_response": true
      }
    output: |
      {
        "resolution_received": true,
        "approved_allocation": "@escalation.approved_allocation"
      }
    next: "treatment_scheduling"

  "treatment_scheduling":
    name: "Treatment Scheduling"
    input: |
      {
        "allocated_resources": "@allocation.resources",
        "patient_availability": "@patient.availability",
        "treatment_duration": "@estimate_duration()"
      }
    output: |
      {
        "schedule": "@create_schedule()",
        "appointment_slots": @schedule.slots,
        "resource_locks": @schedule.locks
      }
    next: "confirm_allocation"

  "confirm_allocation":
    name: "Confirm Resource Allocation"
    input: |
      {
        "schedule": "@schedule",
        "resource_locks": "@locks",
        "patient_confirmation": "required"
      }
    output: |
      {
        "allocation_confirmed": true,
        "resource_reservation_ids": @reservation_ids,
        "confirmed_at": "@timestamp"
      }
    next: "start_treatment"

  "start_treatment":
    name: "Start Treatment"
    input: |
      {
        "case_id": "@case.id",
        "allocated_resources": "@allocation.resources",
        "schedule": "@schedule"
      }
    output: |
      {
        "treatment_started": true,
        "actual_start_time": "@timestamp",
        "resource_activation": @resource_states
      }
    next: "monitor_usage"

  "monitor_usage":
    name: "Monitor Resource Usage"
    input: |
      {
        "allocated_resources": "@activated.resources",
        "treatment_progress": "@treatment.status",
        "time_elapsed": "@time_since_start()"
      }
    output: |
      {
        "usage_metrics": "@calculate_usage_metrics()",
        "resource_stress": "normal",
        "completion_estimate": "@estimate_completion()"
      }
    next: "end_treatment"

  "end_treatment":
    name: "End Treatment"
    input: |
      {
        "case_id": "@case.id",
        "treatment_outcome": "@treatment.result",
        "resource_usage": "@usage.metrics"
      }
    output: |
      {
        "treatment_completed": true,
        "completion_time": "@timestamp",
        "resource_efficiency": @efficiency_score
      }
    next: "release_resources"

  "release_resources":
    name: "Release Resources"
    input: |
      {
        "allocated_resources": "@allocation.resources",
        "condition_after_use": "normal",
        "maintenance_required": false
      }
    output: |
      {
        "resources_released": true,
        "release_time": "@timestamp",
        "resource_availability_updated": true
      }
    next: "update_metrics"

  "update_metrics":
    name: "Update Usage Metrics"
    input: |
      {
        "resource_usage": "@usage.metrics",
        "efficiency_score": "@efficiency",
        "utilization_history": "@historical_usage"
      }
    output: |
      {
        "metrics_updated": true,
        "optimization_insights": "@generate_insights()",
        "forecast_adjustments": "@update_forecasts()"
      }
    next: "cleanup"

  "cleanup":
    name: "Process Cleanup"
    output: |
      {
        "process_completed": true,
        "completed_at": "@timestamp",
        "case_closed": true
      }

  "conflict_handler":
    name: "Handle Resource Conflict"
    input: |
      {
        "conflicts": "@conflicts",
        "original_request": "@request",
        "available_alternatives": "@find_alternatives()"
      }
    output: |
      {
        "conflict_logged": true,
        "resolution_attempted": true,
        "alternative_options": @alternatives
      }
    next: "conflict_resolution"

  "timeout_handler":
    name: "Handle Escalation Timeout"
    input: |
      {
        "escalation_id": "@escalation.id",
        "timeout_duration": "24 hours"
      }
    output: |
      {
        "timeout_handled": true,
        "escalation_failure": true,
        "fallback_required": true
      }
    next: "resource_substitution"

endTasks:
  - "cleanup"