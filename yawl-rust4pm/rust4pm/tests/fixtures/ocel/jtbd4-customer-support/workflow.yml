---
# YAWL Workflow for Customer Support
# Multi-channel support with exception handling and retry mechanisms

id: "customer-support-jtbd4"
name: "Customer Support Workflow"
version: "1.0"
namespace: "yawl.tests.fixtures"

startTasks:
  - "create_ticket"

tasks:
  "create_ticket":
    name: "Create Support Ticket"
    input: |
      {
        "customer_id": "@customer.id",
        "channel": "@support.channel",
        "issue_type": "@support.issue_type",
        "priority": "@calculate_priority(@issue)",
        "severity": "@customer.severity_score",
        "contact_info": "@customer.contact",
        "issue_description": "@support.description"
      }
    output: |
      {
        "ticket_id": "@generated.uuid",
        "created_at": "@timestamp",
        "sla_deadline": "@calculate_sla_deadline(@priority)",
        "issue_category": "@categorize_issue(@issue_type)"
      }
    next: "triage_ticket"

  "triage_ticket":
    name: "Triage Ticket"
    input: |
      {
        "ticket_id": "@ticket.id",
        "issue_type": "@ticket.issue_type",
        "priority": "@ticket.priority",
        "customer_history": "@customer.support_history"
      }
    output: |
      {
        "triage_level": "@determine_triage_level()",
        "required_skills": "@identify_required_skills()",
        "estimated_duration": "@estimate_resolution_time()",
        "channel_appropriate": "@validate_channel()"
      }
    next: "assign_agent"

  "assign_agent":
    name: "Assign Agent"
    input: |
      {
        "ticket_id": "@ticket.id",
        "triage_level": "@triage.level",
        "required_skills": "@triage.skills",
        "customer_location": "@customer.location"
      }
    output: |
      {
        "agent_id": "@find_available_agent(@triage.level)",
        "assignment_time": "@timestamp",
        "estimated_resolution": "@timestamp.plusHours(@triage.duration)",
        "escalation_ready": false
      }
    next: "knowledge_check"
    exception:
      condition: "no_available_agents",
      next: "queue_for_assignment"
      handler: "agent_handler"

  "knowledge_check":
    name: "Check Knowledge Base"
    input: |
      {
        "issue_type": "@ticket.issue_type",
        "similar_issues": "@customer.past_issues",
        "knowledge_base": "@kb.resources"
      }
    output: |
      {
        "solution_available": false,
        "article_ids": [],
        "similar_solutions": [],
        "requires_human_agent": true
      }
    next: "attempt_resolution"

  "attempt_resolution":
    name: "Attempt Resolution"
    input: |
      {
        "ticket_id": "@ticket.id",
        "agent_id": "@assignment.agent_id",
        "customer_contact": "@customer.contact",
        "solution_approach": "@agent.proposed_solution",
        "timeout_threshold": "30 minutes"
      }
    output: |
      {
        "resolution_status": "@execute_resolution()",
        "attempt_number": 1,
        "success_metrics": @resolution_metrics,
        "customer_response_required": true,
        "response_deadline": "@timestamp.plusHours(2)"
      }
    next: "wait_customer_response"
    timeout: "30 minutes"
    exception:
      condition: "resolution_failed",
      next: "escalate_or_retry"
      handler: "resolution_handler"

  "wait_customer_response":
    name: "Wait for Customer Response"
    output: |
      {
        "awaiting_response": true,
        "response_deadline": "@timestamp.plusHours(2)",
        "reminder_triggered": false
      }
    next: "check_customer_response"
    timeout: "2 hours"
    exception:
      condition: "response_timeout",
      next: "send_reminder"
      handler: "timeout_handler"

  "check_customer_response":
    name: "Check Customer Response"
    input: |
      {
        "ticket_id": "@ticket.id",
        "response_received": true,
        "response_content": "@customer.last_response"
      }
    output: |
      {
        "response_type": "@classify_response()",
        "customer_satisfaction": @satisfaction_score,
        "resolution_required": @needs_more_work,
        "escalation_requested": @escalation_requested
      }
    next: "response_decision"

  "response_decision":
    name: "Decision Based on Response"
    options: [
      {
        "condition": "@resolution_required == false && @customer_satisfied == true",
        "next": "close_ticket"
      },
      {
        "condition": "@resolution_required == true && @escalation_requested == false",
        "next": "retry_resolution"
      },
      {
        "condition": "@escalation_requested == true",
        "next": "escalate_ticket"
      },
      {
        "condition": "@needs_more_work == true",
        "next": "follow_up_required"
      }
    ]

  "retry_resolution":
    name: "Retry Resolution"
    input: |
      {
        "ticket_id": "@ticket.id",
        "previous_attempts": "@resolution.attempts",
        "customer_feedback": "@response.feedback",
        "agent_notes": "@agent.resolution_notes"
      }
    output: |
      {
        "retry_number": "@calculate_retry_number()",
        "new_approach": "@adjust_approach()",
        "retry_window": "@timestamp.plusDays(1)",
        "success_probability": "@calculate_success_probability()"
      }
    next: "attempt_resolution"
    exception:
      condition: "max_retries_exceeded",
      next: "escalate_ticket"
      handler: "retry_handler"

  "follow_up_required":
    name: "Follow Up Required"
    input: |
      {
        "ticket_id": "@ticket.id",
        "customer_issues": "@response.issues",
        "additional_info_needed": @info_requirements
      }
    output: |
      {
        "follow_up_needed": true,
        "follow_up_date": "@timestamp.plusDays(3)",
        "information_requests": @info_list,
        "escalation_threshold": "2 follow-ups"
      }
    next: "schedule_follow_up"

  "schedule_follow_up":
    name: "Schedule Follow Up"
    input: |
      {
        "ticket_id": "@ticket.id",
        "follow_up_date": "@follow_up.date",
        "information_requests": "@follow_up.requests",
        "customer_availability": "@customer.availability"
      }
    output: |
      {
        "follow_up_scheduled": true,
        "reminders_sent": true,
        "escalation_count": 0
      }
    next: "execute_follow_up"

  "execute_follow_up":
    name: "Execute Follow Up"
    input: |
      {
        "ticket_id": "@ticket.id",
        "follow_up_date": "@schedule.date",
        "customer_info_received": true,
        "new_issues_identified": false
      }
    output: |
      {
        "follow_up_completed": true,
        "additional_info": @new_information,
        "resolution_status": "progress"
      }
    next: "attempt_resolution"

  "escalate_ticket":
    name: "Escalate Ticket"
    input: |
      {
        "ticket_id": "@ticket.id",
        "escalation_reason": "@escalation.reason",
        "current_agent": "@agent.id",
        "escalation_level": "@determine_escalation_level()"
      }
    output: |
      {
        "escalation_id": "@generated.uuid",
        "escalated_to": "@escalation.target_level",
        "escalation_time": "@timestamp",
        "escalation_reason": "@escalation.reason"
      }
    next: "reassign_ticket"

  "reassign_ticket":
    name: "Reassign Ticket"
    input: |
      {
        "ticket_id": "@ticket.id",
        "escalation_details": "@escalation",
        "new_skill_requirements": @new_requirements,
        "priority": "high"
      }
    output: |
      {
        "new_agent_assigned": true,
        "assignment_time": "@timestamp",
        "agent_level": "level3",
        "knowledge_transfer_required": true
      }
    next: "knowledge_transfer"

  "knowledge_transfer":
    name: "Knowledge Transfer"
    input: |
      {
        "ticket_id": "@ticket.id",
        "previous_agent": "@escalation.from_agent",
        "new_agent": "@assignment.agent_id",
        "case_history": @ticket.history
      }
    output: |
      {
        "transfer_completed": true,
        "case_summary": @case_summary,
        "unresolved_points": @unresolved_items,
        "recommended_actions": @recommended_actions
      }
    next: "attempt_resolution"

  "close_ticket":
    name: "Close Ticket"
    input: |
      {
        "ticket_id": "@ticket.id",
        "resolution_details": "@resolution.details",
        "customer_feedback": "@customer.feedback",
        "satisfaction_score": "@satisfaction.score",
        "resolution_time": "@calculate_resolution_time()"
      }
    output: |
      {
        "ticket_closed": true,
        "closed_at": "@timestamp",
        "final_status": "resolved",
        "resolution_metrics": {
          "first_contact_resolution": @resolution.fcr,
          "average_handle_time": @resolution.aht,
          "customer_satisfaction": @satisfaction.score
        }
      }
    next: "post_resolution"

  "post_resolution":
    name: "Post-Resolution Activities"
    input: |
      {
        "ticket_id": "@ticket.id",
        "solution": "@resolution.details",
        "customer_feedback": "@customer.feedback",
        "knowledge_implications": @kb_implications
      }
    output: |
      {
        "knowledge_article_updated": true,
        "metrics_recorded": true,
        "feedback_analyzed": true,
        "improvement_suggestions": @improvements
      }
    next: "cleanup"

  "cleanup":
    name: "Process Cleanup"
    output: |
      {
        "process_completed": true,
        "completed_at": "@timestamp",
        "case_closed": true,
        "resources_freed": true
      }

  "send_reminder":
    name: "Send Reminder"
    input: |
      {
        "ticket_id": "@ticket.id",
        "reminder_type": "follow_up",
        "customer_contact": "@customer.contact"
      }
    output: |
      {
        "reminder_sent": true,
        "reminder_time": "@timestamp",
        "next_reminder": "@timestamp.plusHours(24)"
      }
    next: "wait_customer_response"

  "agent_handler":
    name: "Handle No Available Agents"
    input: |
      {
        "ticket_id": "@ticket.id",
        "triage_level": "@triage.level",
        "wait_queue_position": 1
      }
    output: |
      {
        "queued": true,
        "wait_time_estimate": "15 minutes",
        "escalation_threshold": "wait_time > 1 hour"
      }
    next: "queue_for_assignment"

  "queue_for_assignment":
    name: "Queue for Assignment"
    output: |
      {
        "in_queue": true,
        "queue_position": @queue.position,
        "assignment_timeout": "@timestamp.plusHours(1)"
      }
    next: "wait_for_agent"
    timeout: "1 hour"
    exception:
      condition: "queue_timeout",
      next: "escalate_ticket"
      handler: "timeout_handler"

  "wait_for_agent":
    name: "Wait for Agent Assignment"
    output: |
      {
        "awaiting_assignment": true,
        "queue_position": @updated.position,
        "estimated_wait": @queue.estimate
      }
    next: "assign_agent"

  "timeout_handler":
    name: "Handle Timeout"
    input: |
      {
        "timeout_type": "@event",
        "timeout_duration": "1-2 hours",
        "ticket_age": "time_since_creation"
      }
    output: |
      {
        "timeout_handled": true,
        "escalation_triggered": true,
        "manual_intervention_required": true
      }
    next: "escalate_ticket"

  "resolution_handler":
    name: "Handle Resolution Failure"
    input: |
      {
        "resolution_attempt": 1,
        "failure_reason": "@resolution.failure",
        "error_code": "@error.code"
      }
    output: |
      {
        "failure_logged": true,
        "retry_eligible": true,
        "escalation_required": false
      }
    next: "escalate_or_retry"

endTasks:
  - "cleanup"