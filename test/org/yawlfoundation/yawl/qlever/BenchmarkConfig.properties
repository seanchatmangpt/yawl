# QLeveldb Benchmark Configuration
# This file contains default values for benchmark parameters

# General configuration
benchmark.warmup.iterations=10
benchmark.measurement.iterations=100
benchmark.thread.count=8
benchmark.timeout.seconds=30

# Memory and GC settings
benchmark.memory.max.heap=2g
benchmark.gc.policy=G1GC
benchmark.gc.heap.region.size=8m

# Performance targets
performance.target.cold.start.seconds=60
performance.target.query.p95.milliseconds=500
performance.target.memory.usage.gb=2
performance.target.gc.pause.milliseconds=500
performance.target.memory.allocation.mb=100

# Query patterns
query.pattern.simple.count=3
query.pattern.medium.count=3
query.pattern.complex.count=2
query.pattern.large.union.max=100

# Result set sizes for testing
result.set.sizes=10,100,1000,10000

# Output settings
output.save.csv=true
output.save.json=true
output.save.console=true
output.directory=benchmark-results

# Concurrency testing
concurrency.thread.counts=1,4,8,16,32
concurrency.operations.per.thread=50

# Format testing
output.formats=json,tsv,csv
